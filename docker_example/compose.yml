services:
  flow:
    image: ghcr.io/hanzoai/flow:latest # or another version tag on https://hub.docker.com/r/ghcr.io/hanzoai/flow
    pull_policy: always               # set to 'always' when using 'latest' image
    ports:
      - "7860:7860"
    depends_on:
      - postgres
    environment:
      - LANGFLOW_DATABASE_URL=postgresql://flow:flow@postgres:5432/flow
      # This variable defines where the logs, file storage, monitor data and secret keys are stored.
      - LANGFLOW_CONFIG_DIR=/app/flow
    volumes:
      - flow-data:/app/flow

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: flow
      POSTGRES_DB: flow
    ports:
      - "5432:5432"
    volumes:
      - flow-postgres:/var/lib/postgresql/data

volumes:
  flow-postgres:
  flow-data:
