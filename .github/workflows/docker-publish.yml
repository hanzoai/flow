name: Build and Push Docker Image

on:
  push:
    branches: [main, test, dev]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/flow
    secrets: inherit
