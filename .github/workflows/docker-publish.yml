name: Build and Push Docker Image

on:
  push:
    branches: [main, test, dev]
    tags: ['v*']
  # No pull_request trigger — prevents fork PRs from running on self-hosted runners
  workflow_dispatch:

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/flow
    secrets: inherit
