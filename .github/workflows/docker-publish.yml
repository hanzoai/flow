name: Build and Push Docker Image

on:
  push:
    branches: [main, test, dev]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/flow
      # arm64 runner offline — build amd64 only until runner is restored
      platforms: linux/amd64
    secrets: inherit
